<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>파시온 회계장부 2026</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- ── 로그인 화면 ── -->
    <div id="login-screen" style="display:none; position:fixed; inset:0; background:linear-gradient(135deg,#0f1e3d,#1a3a6e); z-index:9999; align-items:center; justify-content:center;">
      <div class="login-card">
        <img src="images/pasion.jpg" alt="PASION" class="login-logo" />
        <div class="login-subtitle">파시온 회비 현황</div>

        <div class="form-group" style="text-align:left;">
          <label class="form-label">이름을 선택하세요</label>
          <select id="login-name-select" class="form-control login-select">
            <option value="">— 이름 선택 —</option>
          </select>
        </div>

        <!-- 비밀번호 (임시원 선택 시에만 표시) -->
        <div id="pw-wrap" class="form-group" style="display:none; text-align:left;">
          <label class="form-label">비밀번호</label>
          <input
            id="login-pw"
            type="password"
            placeholder="비밀번호 입력"
            class="form-control login-select"
            onkeydown="if(event.key==='Enter') doLogin()" />
        </div>

        <button onclick="doLogin()" class="login-btn">입장하기</button>
        <div class="login-hint">본인 이름을 선택하면 납부 정보를 확인할 수 있습니다</div>
      </div>
    </div>

    <!-- ── 앱 화면 ── -->
    <div id="app-screen" style="display:none">
      <header class="header">
        <div class="header-left">
          <div class="header-title">PASIÓN · 파시온</div>
          <div class="header-sub">회계장부 2026 &nbsp;·&nbsp; 총무: 임시원</div>
        </div>
        <div class="header-right">
          <span id="sync-status" class="sync-status">⏳ 연결 중...</span>
          <span id="current-user-name" class="current-user"></span>
          <button class="btn btn-outline" onclick="syncNow()">🔄 동기화</button>
          <button class="btn btn-gold" onclick="exportExcel()">📊 엑셀</button>
          <button class="btn btn-outline" onclick="doLogout()">🚪 나가기</button>
        </div>
      </header>

      <main class="main">
        <div class="summary-grid">
          <div class="card navy">
            <div class="card-label">총 회원</div>
            <div class="card-value" id="s-total">-</div>
          </div>
          <div class="card green">
            <div class="card-label">직장인</div>
            <div class="card-value green" id="s-worker">-</div>
          </div>
          <div class="card blue">
            <div class="card-label">학생</div>
            <div class="card-value blue" id="s-student">-</div>
          </div>
          <div class="card gold">
            <div class="card-label">예상 총회비</div>
            <div class="card-value gold" id="s-expected">-</div>
          </div>
          <div class="card green">
            <div class="card-label">완납 인원</div>
            <div class="card-value green" id="s-paid">-</div>
          </div>
          <div class="card red">
            <div class="card-label">미납 인원</div>
            <div class="card-value red" id="s-unpaid">-</div>
          </div>
          <div class="card green">
            <div class="card-label">총 납부액</div>
            <div class="card-value green" id="s-collected">-</div>
          </div>
          <div class="card red">
            <div class="card-label">총 미납액</div>
            <div class="card-value red" id="s-missing">-</div>
          </div>
        </div>

        <div class="section-header">
          <div class="section-title">회원 납부 현황</div>
          <div class="search-bar">
            <input class="search-input" id="search-name" placeholder="🔍 이름 검색" oninput="renderMembers()" />
            <select class="filter-select" id="filter-type" onchange="renderMembers()">
              <option value="">전체</option>
              <option value="직장인">직장인</option>
              <option value="학생">학생</option>
            </select>
            <select class="filter-select" id="filter-pay" onchange="renderMembers()">
              <option value="">납부 전체</option>
              <option value="완납">완납</option>
              <option value="분할">분할납부</option>
              <option value="일시정지">일시정지</option>
              <option value="미납">미납</option>
              <option value="반납">반납</option>
            </select>
            <select class="filter-select" id="filter-active" onchange="renderMembers()">
              <option value="all">전체 (비활성 포함)</option>
              <option value="active">활성 회원</option>
              <option value="inactive">비활성만</option>
            </select>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th class="left">이름</th>
                <th>구분</th>
                <th>현황</th>
                <th>연회비</th>
                <th>납부상태</th>
                <th>납부액</th>
                <th>미납액</th>
                <th class="left">비고</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="members-tbody"></tbody>
            <tfoot>
              <tr class="total-row">
                <td colspan="4" style="text-align:left; padding-left:16px">합 계</td>
                <td id="tf-fee" class="num"></td>
                <td></td>
                <td id="tf-collected" class="num amount-positive"></td>
                <td id="tf-missing" class="num amount-negative"></td>
                <td colspan="2"></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </main>
    </div>

    <!-- MODAL: 회원 수정 -->
    <div class="modal-overlay" id="modal-member">
      <div class="modal">
        <div class="modal-title">✏️ 납부 정보 수정</div>
        <input type="hidden" id="edit-idx" />
        <div class="form-group">
          <label class="form-label">이름</label>
          <input class="form-control" id="edit-name" readonly />
        </div>
        <div class="form-group">
          <label class="form-label">구분</label>
          <select class="form-control" id="edit-type">
            <option value="직장인">직장인</option>
            <option value="학생">학생</option>
            <option value="취준생">취준생</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">납부 상태</label>
            <select class="form-control" id="edit-payStatus">
              <option value="미납">미납</option>
              <option value="완납">완납</option>
              <option value="분할">분할납부</option>
              <option value="일시정지">일시정지</option>
              <option value="반납">반납</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">활동 현황</label>
            <select class="form-control" id="edit-status">
              <option value="재직중">재직중</option>
              <option value="휴직중">휴직중</option>
              <option value="퇴직">퇴직</option>
              <option value="재학중">재학중</option>
              <option value="졸업">졸업</option>
              <option value="휴학중">휴학중</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">납부액 (원)</label>
          <input class="form-control" type="number" id="edit-paid" placeholder="0" />
        </div>
        <div class="form-group">
          <label class="form-label">비고</label>
          <input class="form-control" id="edit-note" placeholder="메모" />
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeModal('modal-member')">취소</button>
          <button class="btn btn-primary" onclick="saveMember()">저장</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
